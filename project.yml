name: ichiseEdit
options:
  bundleIdPrefix: com.ichise
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ichiseEdit:
    type: application
    platform: iOS
    sources:
      - ichiseEdit
    scheme:
      testTargets:
        - ichiseEditTests
    info:
      path: ichiseEdit/Support/Info.plist
      properties:
        CFBundleDisplayName: ichiseEdit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ichise.ichiseedit
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DGGN7U8332
        ENABLE_PREVIEWS: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"

  ichiseEditTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ichiseEditTests
    dependencies:
      - target: ichiseEdit
