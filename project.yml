name: ichiseEdit
options:
  bundleIdPrefix: com.ichise
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ichiseEdit:
    type: application
    platform: iOS
    sources:
      - ichiseEdit
    scheme:
      testTargets:
        - ichiseEditTests
    info:
      path: ichiseEdit/Support/Info.plist
      properties:
        CFBundleDisplayName: ichiseEdit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
          - CFBundleTypeName: Markdown Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
          - CFBundleTypeName: Source Code
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.source-code
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Text
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type:
                - text/markdown
          # iOS が UTI を知らない拡張子を public.source-code として扱えるようにする
          - UTTypeIdentifier: com.ichise.ichiseedit.common-lisp-source
            UTTypeDescription: Common Lisp Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - lisp
                - cl
                - asd
          - UTTypeIdentifier: com.ichise.ichiseedit.islisp-source
            UTTypeDescription: ISLISP Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - lsp
          - UTTypeIdentifier: com.ichise.ichiseedit.scheme-source
            UTTypeDescription: Scheme Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - scm
                - ss
                - sld
                - rkt
          - UTTypeIdentifier: com.ichise.ichiseedit.clojure-source
            UTTypeDescription: Clojure Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - clj
                - cljs
                - cljc
                - edn
          - UTTypeIdentifier: com.ichise.ichiseedit.emacs-lisp-source
            UTTypeDescription: Emacs Lisp Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - el
          - UTTypeIdentifier: com.ichise.ichiseedit.haskell-source
            UTTypeDescription: Haskell Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - hs
          - UTTypeIdentifier: com.ichise.ichiseedit.latex-source
            UTTypeDescription: LaTeX Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - tex
                - sty
                - cls
                - ltx
          - UTTypeIdentifier: com.ichise.ichiseedit.typescript-source
            UTTypeDescription: TypeScript Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - tsx
          - UTTypeIdentifier: com.ichise.ichiseedit.go-source
            UTTypeDescription: Go Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - go
          - UTTypeIdentifier: com.ichise.ichiseedit.rust-source
            UTTypeDescription: Rust Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - rs
          - UTTypeIdentifier: com.ichise.ichiseedit.kotlin-source
            UTTypeDescription: Kotlin Source
            UTTypeConformsTo:
              - public.source-code
            UTTypeTagSpecification:
              public.filename-extension:
                - kt
                - kts
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        UISupportsDocumentBrowser: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ichise.ichiseedit
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DGGN7U8332
        ENABLE_PREVIEWS: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"

  ichiseEditTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ichiseEditTests
    dependencies:
      - target: ichiseEdit
